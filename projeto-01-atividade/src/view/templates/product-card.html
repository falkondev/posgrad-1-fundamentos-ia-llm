<div class="bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col overflow-hidden hover:shadow-md transition-shadow">
    <div class="p-4 flex flex-col flex-1">
        <h5 class="font-semibold text-gray-900 text-sm leading-snug mb-1">{{name}}</h5>
        <p class="text-xs text-gray-400 mb-3">{{category}}</p>
        <div class="text-sm text-gray-700 space-y-0.5 mb-4 flex-1">
            <p><span class="font-medium text-gray-500">Price:</span> <span class="font-semibold text-gray-900">${{price}}</span></p>
            <p><span class="font-medium text-gray-500">Brand:</span> {{brand}}</p>
        </div>
        {{rankBadge}}
        <button class="buy-now-btn w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 disabled:opacity-50 disabled:cursor-not-allowed text-white text-sm font-medium py-2 rounded-lg transition-colors" data-product='{{product}}'>
            Buy Now
        </button>
    </div>
</div>
