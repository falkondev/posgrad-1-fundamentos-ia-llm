<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce Recommendation System</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body class="bg-gray-100 min-h-screen py-8 px-4">
    <div class="max-w-7xl mx-auto">

        <!-- Header -->
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">E-commerce Recommendation System</h1>
            <p class="text-gray-500 mt-1 text-sm">Powered by TensorFlow.js neural network</p>
        </header>

        <!-- Top panels -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">

            <!-- User Profile Card -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-100 bg-gray-50">
                    <h4 class="text-base font-semibold text-gray-800">User Profile</h4>
                </div>
                <div class="p-6">
                    <form id="userForm">
                        <div class="grid grid-cols-2 gap-4 mb-6">
                            <div>
                                <label for="userSelect" class="block text-xs font-medium text-gray-600 mb-1 uppercase tracking-wide">Select User</label>
                                <select id="userSelect" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-800 bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                                    <option value="">-- Select a user --</option>
                                </select>
                            </div>
                            <div>
                                <label for="userAge" class="block text-xs font-medium text-gray-600 mb-1 uppercase tracking-wide">Age</label>
                                <input type="number" id="userAge" disabled class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-600 bg-gray-50 focus:outline-none cursor-not-allowed">
                            </div>
                        </div>
                    </form>

                    <div id="pastPurchasesContainer">
                        <h5 class="text-xs font-semibold text-gray-600 uppercase tracking-wide mb-3">Past Purchases</h5>
                        <div id="pastPurchasesList" class="space-y-2"></div>
                    </div>
                </div>
            </div>

            <!-- Model Training Card -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-100 bg-gray-50">
                    <h4 class="text-base font-semibold text-gray-800">Model Training</h4>
                </div>
                <div class="p-6">
                    <div class="flex flex-wrap gap-3 mb-6">
                        <button id="trainModelBtn" class="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white text-sm font-medium px-5 py-2.5 rounded-lg transition-colors disabled:opacity-60 disabled:cursor-not-allowed">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><path d="M15 2v2M9 2v2M2 9h2M2 15h2M22 9h-2M22 15h-2M15 22v-2M9 22v-2"/></svg>
                            Train Recommendation Model
                        </button>
                        <button disabled id="runRecommendationBtn" class="inline-flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-800 text-white text-sm font-medium px-5 py-2.5 rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                            Run Recommendation
                        </button>
                        <button id="toggleVisorBtn" class="hidden inline-flex items-center gap-2 bg-violet-600 hover:bg-violet-700 active:bg-violet-800 text-white text-sm font-medium px-5 py-2.5 rounded-lg transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                            Training Dashboard
                        </button>
                    </div>

                    <div class="all-users-purchases">
                        <button id="purchasesDiv" type="button" class="flex items-center gap-2 text-xs font-semibold text-gray-600 uppercase tracking-wide mb-3 w-full text-left hover:text-gray-900 transition-colors">
                            All Users Purchase Data
                            <svg id="purchasesArrow" class="w-4 h-4 transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                            </svg>
                        </button>
                        <div id="allUsersPurchasesList" class="overflow-auto max-h-96 hidden space-y-1 pr-1"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Products Section -->
        <div class="mb-4 flex items-center justify-between">
            <h3 class="text-xl font-bold text-gray-900">Products</h3>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4" id="productList"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-vis@1.5.1/dist/tfjs-vis.umd.min.js"></script>
    <script type="module" src="./src/index.js"></script>
</body>

</html>
